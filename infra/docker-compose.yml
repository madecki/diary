services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: diary
      POSTGRES_PASSWORD: diary
      POSTGRES_DB: diary
    ports:
      - "54320:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diary"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.12.4
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "42220:4222"
      - "48222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "nats-server", "--signal", "ldm"]
      interval: 10s
      timeout: 5s
      retries: 3

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@diary.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "50500:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  nats_data:
